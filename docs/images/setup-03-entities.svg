  <rect x="92" y="652" width="740" height="38" rx="8" fill="#18282c" stroke="#0ea5c6" stroke-width="2"/>
  <text x="116" y="677" fill="#62d7f7" font-family="Arial, Helvetica, sans-serif" font-size="18">kWh-Sensoren: device_class energy, state_class total_increasing, last_reset = None</text>
